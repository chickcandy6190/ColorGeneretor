<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ColorGenerator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f5f5f5; color: #333; }
        .palette { display: flex; justify-content: center; gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .color-box { width: 150px; height: 150px; border-radius: 8px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; }
        
        .sample-container { display: flex; justify-content: center; margin-top: 20px; }
        .card { width: 300px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; text-align: left; transition: transform 0.2s; }
        .card-header { height: 120px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold; }
        .card-body { padding: 20px; }
        .card-title { margin: 0 0 10px 0; font-size: 18px; }
        .card-text { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 20px; }
        .card-btn { display: block; width: 100%; padding: 10px 0; text-align: center; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <h1>ColorGenerator</h1>
    <p>ベースカラーを選んでください：</p>
    <input type="color" id="baseColor" value="#ff0000">

    <div class="palette">
        <div>
            <p>ベースカラー</p>
            <div id="box1" class="color-box" style="background-color: #ff0000;">#FF0000</div>
        </div>
        <div>
            <p>補色（反対の色）</p>
            <div id="box2" class="color-box" style="background-color: #00ffff;">#00FFFF</div>
        </div>
    </div>

    <h2>プレビューサンプル</h2>
    <div class="sample-container">
        <div class="card">
            <div id="sampleHeader" class="card-header" style="background-color: #ff0000;">Preview</div>
            <div class="card-body">
                <h3 class="card-title">SAMPLE</h3>
                <p class="card-text">選択したベースカラーと補色が自動で適用されます。↓ボタンは押しても何もありません。</p>
                <button id="sampleBtn" class="card-btn" style="background-color: #00ffff; color: #000;">詳細を見る</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('baseColor');
        const box1 = document.getElementById('box1');
        const box2 = document.getElementById('box2');
        
        const sampleHeader = document.getElementById('sampleHeader');
        const sampleBtn = document.getElementById('sampleBtn');

        //明るい背景なら黒文字、暗い背景なら白文字
        function getTextColor(r, g, b) {
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#FFFFFF';
        }

        input.addEventListener('input', (e) => {
            const hex = e.target.value;
            box1.style.backgroundColor = hex;
            box1.textContent = hex.toUpperCase();

            // 16進数からRGBに変換
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            // 補色計算
            const compRNum = 255 - r;
            const compGNum = 255 - g;
            const compBNum = 255 - b;

            const compR = compRNum.toString(16).padStart(2, '0');
            const compG = compGNum.toString(16).padStart(2, '0');
            const compB = compBNum.toString(16).padStart(2, '0');
            const compHex = `#${compR}${compG}${compB}`.toUpperCase();

            box2.style.backgroundColor = compHex;
            box2.textContent = compHex;


            sampleHeader.style.backgroundColor = hex;
            sampleHeader.style.color = getTextColor(r, g, b);


            sampleBtn.style.backgroundColor = compHex;
            sampleBtn.style.color = getTextColor(compRNum, compGNum, compBNum);
        });
    </script>
</body>
</html>
